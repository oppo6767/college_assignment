<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <!--
    original: https://codepen.io/BrianCross/pen/PoWapLP
    horizontal version: https://codepen.io/GreenSock/pen/xxWdeMK
    -->
    <header> <!-- 상단 메뉴 -->
        <div class="home-menu">
            <a href="gallery.html">이동하기</a>
        </div>
    </header>
    <!-- 
    스크롤 영역
    outer: 위에서 아래로 스크롤되는 영역
    inner: 아래에서 위로 스크롤되는 영역
    bg: 배경 이미지 영역과 텍스트 영역
    -->
    <section class="first">
        <div class="outer">
            <div class="inner">
                <div class="bg">
                    <h2 class="section-heading">사이트에 오신 것을 환영합니다</h2>
                </div>
            </div>
        </div>
    </section>
    <section class="second">
        <div class="outer">
            <div class="inner">
                <div class="bg">
                    <h2 class="section-heading">사진 좋아하는 사람을 위한 사이트입니다</h2>
                </div>
            </div>
        </div>
    </section>
    <section class="third">
        <div class="outer">
            <div class="inner">
                <div class="bg">
                    <h2 class="section-heading">누구나 쉽게 사진을 공유할 수 있습니다</h2>
                </div>
            </div>
        </div>
    </section>
    <section class="fourth">
        <div class="outer">
            <div class="inner">
                <div class="bg">
                    <h2 class="section-heading">다른 사람과 사진 공유을 해보세요</h2>
                </div>
            </div>
        </div>
    </section>
    <script src="js/scroll.js"></script>
</body>
</html>
